<div class="login-container">
  <div class="login-card">
    <img src="/logo.png" alt="Top Logo" class="top-logo" />
    <div class="brand-name">Aptlyst</div>

    <div class="login-heading">Sign up</div>
    <div class="welcome-text">Welcome let' Start your journey with Aptlyst.</div>

    <form>
      <input type="text" placeholder="User Name"/>
      <input type="email" placeholder="Email" name="email" />
      <input type="password" placeholder="Set Password" name="password" />
      <button type="submit">Sign Up</button>
      <p class="or-text">----------------- or -----------------</p>
      <button class="google-button">
        <img src="/google-logo.png" alt="Google Logo" class="google-logo" />
        Sign up with Google
      </button>
      <p class="policy-text">
        By signing up to create an account I accept <a>Company's Terms of Use and Privacy Policy.</a>
      </p>
    </form>
  </div>
</div>
